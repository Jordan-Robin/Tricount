<div
  class="fixed top-10 left-1/2 -translate-x-1/2 z-50 px-6 py-4 rounded-xl border text-sm font-medium shadow-lg transition-all duration-300 ease-out min-w-64 max-w-sm text-center"
  [ngClass]="{
    'opacity-0 -translate-y-3 pointer-events-none': !layoutService.notification(),
    'opacity-100 translate-y-0': !!layoutService.notification(),
    'bg-green-50 border-green-200 text-green-700': layoutService.notification()?.type === 'success',
    'bg-red-50 border-red-200 text-red-700': layoutService.notification()?.type === 'error',
  }"
>
  {{ layoutService.notification()?.message }}
</div>
